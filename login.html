<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Sign In | Jual Beli Lock Growtopia</title>
    <style>
        body{font-family:Arial, Helvetica, sans-serif;background:#fff3e0;margin:0}
        header{background:#ec6f09;color:#fff;padding:14px;text-align:center}
        nav{display:flex;justify-content:center;gap:12px;padding:8px;background:#ec6f09}
        .dropbtn{background:transparent;color:white;border:none;font-weight:bold;cursor:pointer;padding:6px 8px;font-size:16px}
        .dropdown{position:relative;display:inline-block}
        .dropdown-content{display:none;position:absolute;background:#fff;min-width:140px;box-shadow:0 6px 12px rgba(0,0,0,0.12);border-radius:6px;right:0;z-index:100}
        .dropdown-content a{display:block;padding:8px 12px;color:#333;text-decoration:none}
        .dropdown-content a:hover{background:#fff3e0}
        .dropdown-content.show{display:block}
        .form-box{max-width:360px;margin:30px auto;background:#fff;padding:20px;border-radius:8px;border:1px solid #ffd59a}
        input{width:100%;padding:10px;margin:8px 0;border:1px solid #f0a14b;border-radius:4px}
        button{background:#ff9800;color:#fff;border:none;padding:10px 14px;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
    <header>
        <h1>Sign In</h1>
        <nav>
            <a href="index.html" style="color:#fff;font-weight:bold;text-decoration:none">Beranda</a>
            <a href="adit.html" style="color:#fff;font-weight:bold;text-decoration:none">Tentang Kami</a>
            <div class="dropdown" id="loginDropdown">
                <button class="dropbtn" aria-haspopup="true" aria-expanded="false">Login ▾</button>
                <div class="dropdown-content" aria-label="submenu">
                    <a href="login.html">Sign In</a>
                    <a href="register.html">Sign Up</a>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="form-box">
            <form onsubmit="event.preventDefault(); alert('Sign In demo');">
                <label>Username or Email</label>
                <input type="text" required>
                <label>Password</label>
                <input type="password" required>
                <div style="text-align:center;margin-top:8px"><button type="submit">Sign In</button></div>
            </form>
            <p style="text-align:center;margin-top:12px">Belum punya akun? <a href="register.html">Sign Up</a></p>
        </div>
    </main>
    <script>
        (function(){var drop=document.getElementById('loginDropdown'); if(!drop) return; var btn=drop.querySelector('.dropbtn'); var menu=drop.querySelector('.dropdown-content'); function closeMenus(){menu.classList.remove('show'); btn.setAttribute('aria-expanded','false');} btn.addEventListener('click', function(e){ e.stopPropagation(); menu.classList.toggle('show'); btn.setAttribute('aria-expanded', menu.classList.contains('show') ? 'true' : 'false'); }); document.addEventListener('click', closeMenus);})();
    </script>
</body>
</html>
